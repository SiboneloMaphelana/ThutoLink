<div class="result-page">
  <div class="result-card cancel">
    <div class="icon-circle">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <h1>Payment Cancelled</h1>
    <p>Your payment was not completed. No charges have been made to your account. You can try again whenever you're ready.</p>
    <button (click)="retry()">Try Again</button>
  </div>
</div>
