<div class="payment-page">
  <div class="payment-card">
    <div class="card-header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </div>
      <h1>Secure Payment</h1>
      <p class="subtitle">Complete your purchase with PayFast</p>
    </div>

    <div *ngIf="error" class="error-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #paymentForm="ngForm">
      <div class="form-section">
        <h2>Personal Details</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="nameFirst">First Name</label>
            <input
              id="nameFirst"
              type="text"
              [(ngModel)]="payment.nameFirst"
              name="nameFirst"
              required
              placeholder="John"
            />
          </div>
          <div class="form-group">
            <label for="nameLast">Last Name</label>
            <input
              id="nameLast"
              type="text"
              [(ngModel)]="payment.nameLast"
              name="nameLast"
              required
              placeholder="Doe"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="emailAddress">Email</label>
            <input
              id="emailAddress"
              type="email"
              [(ngModel)]="payment.emailAddress"
              name="emailAddress"
              required
              placeholder="john@example.com"
            />
          </div>
          <div class="form-group">
            <label for="cellNumber">Phone (optional)</label>
            <input
              id="cellNumber"
              type="tel"
              [(ngModel)]="payment.cellNumber"
              name="cellNumber"
              placeholder="0821234567"
            />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2>Order Details</h2>
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input
            id="itemName"
            type="text"
            [(ngModel)]="payment.itemName"
            name="itemName"
            required
            placeholder="Product or service name"
          />
        </div>
        <div class="form-group">
          <label for="itemDescription">Description (optional)</label>
          <textarea
            id="itemDescription"
            [(ngModel)]="payment.itemDescription"
            name="itemDescription"
            placeholder="Brief description of the purchase"
            rows="3"
          ></textarea>
        </div>
        <div class="form-group amount-group">
          <label for="amount">Amount (ZAR)</label>
          <div class="amount-input">
            <span class="currency">R</span>
            <input
              id="amount"
              type="number"
              [(ngModel)]="payment.amount"
              name="amount"
              required
              min="1"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </div>
      </div>

      <button
        type="submit"
        class="pay-button"
        [disabled]="!paymentForm.valid || loading || payment.amount <= 0"
      >
        <span *ngIf="!loading">
          Pay R{{ payment.amount | number:'1.2-2' }}
        </span>
        <span *ngIf="loading" class="spinner-wrapper">
          <span class="spinner"></span>
          Processing...
        </span>
      </button>

      <p class="secure-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0110 0v4"></path>
        </svg>
        Secured by PayFast. Your payment details are encrypted.
      </p>
    </form>
  </div>
</div>
