<div class="shell">
  <header class="topbar">
    <div class="container topbar-inner">
      <a routerLink="/search" class="brand">
        <span class="brand-mark">E</span>
        <div>
          <strong>WeekendWise</strong>
          <small>Weekend trip planner</small>
        </div>
      </a>

      <nav class="nav-links">
        <a routerLink="/search" routerLinkActive="active">Search</a>
        <a routerLink="/results" routerLinkActive="active">Results</a>
        <a routerLink="/favorites" routerLinkActive="active">Saved trips</a>
      </nav>

      <div class="topbar-actions" *ngIf="isAuthenticated(); else guestActions">
        <span class="user-pill">{{ currentUserName() }}</span>
        <button class="btn btn-secondary" type="button" (click)="logout()">Logout</button>
      </div>

      <ng-template #guestActions>
        <div class="topbar-actions">
          <a routerLink="/auth/login" class="btn btn-secondary">Login</a>
          <a routerLink="/auth/register" class="btn btn-primary">Create account</a>
        </div>
      </ng-template>
    </div>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
