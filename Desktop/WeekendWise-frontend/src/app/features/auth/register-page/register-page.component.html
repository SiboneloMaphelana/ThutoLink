<section class="auth-page container">
  <div class="auth-copy">
    <span class="pill">Create EscapeScout account</span>
    <h1>Register to save and compare trip options.</h1>
    <p>Start with a lightweight account and use the demo backend fallback until the API is ready.</p>
  </div>

  <form class="card auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="fullName">Full name</label>
      <input id="fullName" class="input" type="text" formControlName="fullName">
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" class="input" type="email" formControlName="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" class="input" type="password" formControlName="password">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="preferredCurrency">Currency</label>
        <select id="preferredCurrency" class="select" formControlName="preferredCurrency">
          <option value="ZAR">ZAR</option>
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
        </select>
      </div>

      <div class="field">
        <label for="homeAirport">Home airport</label>
        <input id="homeAirport" class="input" type="text" formControlName="homeAirport">
      </div>
    </div>

    <button class="btn btn-primary auth-submit" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating account...' : 'Create account' }}
    </button>

    <p class="auth-link">Already registered? <a routerLink="/auth/login">Log in</a></p>
  </form>
</section>
